                '你最看重对方的哪三个特质？',
                '你会做饭吗？拿手菜是什么？',
                '你周末一般喜欢宅家还是出门？',
                '你对异地恋怎么看？',
                '你最想和另一半一起做的事是什么？',
                '你理想的相处模式是什么样的？',
                '你对“仪式感”怎么看？',
                '你喜欢的异性穿搭风格是什么？',
                '你最难忘的一次心动瞬间？'
            ],
            team: [
                '你觉得一个好团队最重要的特质是什么？',
                '如果团建，你最想玩什么活动？',
                '工作中让你最解压的事是什么？',
                '你遇到过最有趣的同事是什么样的？',
                '如果给团队提一个建议，你会说什么？',
                '你工作中最有成就感的一件事？',
                '你理想中的团队氛围是什么样的？',
                '你最擅长的一个工作技能是什么？',
                '如果可以和团队一起做一件事，你想做什么？',
                '你觉得团队里最不可或缺的角色是什么？'
            ]
        };

        // ===== 游戏库渲染 & 筛选 =====
        function renderGames() {
            const key = $('#gameSearch').value.toLowerCase();
            const scene = $('#gameScene').value;
            const list = games.filter(g => {
                if (scene !== 'all' && g.scene !== scene && g.scene !== 'all') return false;
                if (key && !g.name.toLowerCase().includes(key) && !g.desc.toLowerCase().includes(key)) return false;
                return true;
            });
            $('#gameList').innerHTML = list.map(g => `
            <div class="bg-white dark:bg-gray-800 rounded-xl shadow p-4 relative">
                <span class="absolute top-2 right-2 text-xs bg-primary/10 text-primary px-2 py-1 rounded-full">${g.scene}</span>
                <h3 class="font-bold text-lg">${g.name}</h3>
                <p class="text-sm text-gray-500 mt-1">${g.desc}</p>
                <button onclick="openGameDetail(${g.id})" class="w-full mt-3 py-2 bg-primary text-white rounded-lg text-sm hover:bg-opacity-90">快速开局</button>
            </div>
            `).join('');
        }
        function resetGameFilter() {
            $('#gameSearch').value = '';
            $('#gameScene').value = 'all';
            renderGames();
        }
        function openGameDetail(id) {
            const g = games.find(x => x.id === id);
            showModal(`
                <h3 class="font-bold text-xl mb-2">${g.name}</h3>
                <div class="text-sm space-y-2">
                    <p><b>主持话术：</b>${g.host}</p>
                    <p><b>规则：</b><br>${g.rule}</p>
                    ${g.questions.length ? `<div class="bg-gray-100 dark:bg-gray-700 p-3 rounded-lg mt-2"><b>题库（${g.questions.length}条）：</b><br>${g.questions.map(q => '• ' + q).join('<br>')}</div>` : ''}
                </div>
                <button onclick="closeModal()" class="w-full mt-4 py-2 bg-primary text-white rounded-full hover:bg-opacity-90">关闭</button>
            `);
        }
        function randomGame() {
            const g = games[Math.floor(Math.random() * games.length)];
            showModal(`
                <h3 class="font-bold text-xl mb-2">随机推荐：${g.name}</h3>
                <p class="text-sm">${g.desc}</p>
                <button onclick="openGameDetail(${g.id})" class="w-full mt-2 py-2 bg-primary text-white rounded-full hover:bg-opacity-90">查看详情</button>
                <button onclick="closeModal()" class="w-full mt-2 py-2 bg-gray-200 dark:bg-gray-700 rounded-full">关闭</button>
            `);
        }

        // ===== 话题渲染 & 复制 =====
        function renderTopics() {
            const type = $('#topicType').value;
            const items = topicPool[type];
            $('#topicList').innerHTML = items.map(t => `
            <div class="bg-white dark:bg-gray-800 p-4 rounded-xl shadow flex justify-between items-center">
                <p class="text-sm">${t}</p>
                <button onclick="copyTopic('${t}')" class="text-primary hover:text-opacity-80"><i class="fa fa-copy"></i></button>
            </div>
            `).join('');
        }
        function copyTopic(text) {
            navigator.clipboard.writeText(text);
            toast('已复制话题');
        }

        // ===== 活动策划（支持游戏环节联动） =====
        function renderPlan() {
            let items = JSON.parse(localStorage.getItem('plan')) || [
                { name: '破冰热身', time: 5 },
                { name: '互动游戏', time: 15 },
                { name: '总结分享', time: 10 }
            ];
            $('#planItems').innerHTML = items.map((it, i) => {
                const clickEvent = it.type === 'game' ? `openGameDetail(${it.gameId})` : '';
                return `
                <div class="bg-white dark:bg-gray-800 p-4 rounded-xl shadow flex justify-between items-center ${clickEvent ? 'cursor-pointer' : ''}" draggable data-i="${i}" onclick="${clickEvent}">
                    <div>
                        <div class="font-medium flex items-center gap-2">
                            ${it.type === 'game' ? '<i class="fa fa-gamepad text-primary"></i>' : ''}
                            ${it.name}
                        </div>
                        <div class="text-xs text-gray-500">${it.time} 分钟</div>
                    </div>
                    <div class="cursor-move text-gray-400"><i class="fa fa-bars"></i></div>
                </div>
                `;
            }).join('');
            makeDrag();
        }
        // 拖拽排序
        function makeDrag() {
            $$('#planItems [draggable]').forEach(el => {
                el.ondragstart = e => e.dataTransfer.setData('i', el.dataset.i);
                el.ondragover = e => e.preventDefault();
                el.ondrop = e => {
                    let from = +e.dataTransfer.getData('i');
                    let to = +el.dataset.i;
                    let arr = JSON.parse(localStorage.getItem('plan')) || [];
                    [arr[from], arr[to]] = [arr[to], arr[from]];
                    localStorage.setItem('plan', JSON.stringify(arr));
                    renderPlan();
                    toast('已调整环节顺序');
                };
            });
        }
        // 添加普通环节
        function addPlanItem() {
            let arr = JSON.parse(localStorage.getItem('plan')) || [];
            arr.push({ name: '新环节', time: 10 });
            localStorage.setItem('plan', JSON.stringify(arr));
            renderPlan();
            toast('已添加普通环节');
        }
        // 添加游戏环节（联动游戏库）
        function addGameItem() {
            const randomGameData = games[Math.floor(Math.random() * games.length)];
            let arr = JSON.parse(localStorage.getItem('plan')) || [];
            arr.push({
                name: randomGameData.name,
                time: 10,
                type: 'game',
                gameId: randomGameData.id
            });
            localStorage.setItem('plan', JSON.stringify(arr));
            renderPlan();
            toast('已添加游戏环节，点击卡片查看玩法');
        }
        // 加载模板
        function loadPlanTemplate() {
            localStorage.setItem('plan', JSON.stringify([
                { name: '破冰热身', time: 5 },
                { name: '互动游戏', time: 15 },
                { name: '总结分享', time: 10 }
            ]));
            renderPlan();
            toast('已加载聚会模板');
        }
        // 导出PDF
        function exportPdf() {
            toast('PDF 已开始导出');
        }

        // ===== 页面初始化加载 =====
        document.addEventListener('DOMContentLoaded', () => {
            // 读取本地存储-深色模式
            if (localStorage.getItem('darkMode') === 'true') {
                document.documentElement.classList.add('dark');
            }
            // 读取本地存储-字体大小
            const fontSize = localStorage.getItem('fontSize') || '16';
            $('#fontSize').value = fontSize;
            document.body.style.fontSize = fontSize + 'px';

            // 初始化渲染
            renderGames();
            renderTopics();
            renderPlan();

            // 离线提示
            if (!navigator.onLine) toast('当前离线 · 仅显示本地内容');
        });

        // ===== 摇一摇换话题（防误触） =====
        let lastShake = 0;
        window.addEventListener('devicemotion', e => {
            if ($('#page-topics').classList.contains('hidden')) return;
            let now = Date.now();
            if (now - lastShake < 2000) return;
            let acc = e.accelerationIncludingGravity;
            const total = Math.abs(acc.x) + Math.abs(acc.y) + Math.abs(acc.z);
            if (total > 25) {
                lastShake = now;
                renderTopics();
                toast('摇一摇 · 已换一批话题');
            }
        });
    </script>
</body>
</html>
