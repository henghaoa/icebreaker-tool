<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>聚会桌游助手 - 完整版</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://cdn.jsdelivr.net/npm/font-awesome@4.7.0/css/font-awesome.min.css" rel="stylesheet">
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            primary: '#ff6b35',
            avalon: '#165DFF',
            success: '#36d399',
            danger: '#f87272',
            vote: '#8b5cf6',
          }
        }
      }
    }
  </script>
  <style>
    body { user-select: none; }
    .toast { position: fixed; bottom: 10vh; left: 50%; transform: translateX(-50%); background: rgba(0,0,0,0.8); color: white; padding: 8px 16px; border-radius: 8px; opacity: 0; transition: 0.3s; z-index: 9999; }
    .toast.show { opacity: 1; }
    .blur-role { filter: blur(10px); }
  </style>
</head>
<body class="bg-gray-100 text-gray-800 min-h-screen">
  <div class="toast" id="toast"></div>

  <div class="max-w-xl mx-auto p-4 pb-20">
    <h1 class="text-[22px] font-bold text-primary text-center mb-1">聚会桌游助手</h1>
    <p class="text-xs text-gray-500 text-center mb-4">狼人杀 + 阿瓦隆 | 多机通用 | 完整版</p>

    <div id="pages">
      <!-- 首页 -->
      <div id="page-home" class="block">
        <div class="bg-white rounded-xl p-4 shadow mb-4">
          <h3 class="font-bold text-primary mb-2">🎮 主持人 - 创建对局</h3>
          <div class="space-y-2">
            <select id="game-type" class="w-full border p-2 rounded">
              <option value="werewolf">狼人杀</option>
              <option value="avalon">阿瓦隆</option>
            </select>
            <input type="number" id="player-count" placeholder="人数（3-20）" min="3" max="20" value="6" class="w-full border p-2 rounded">
            <button onclick="hostCreateGame()" class="w-full bg-primary text-white p-2 rounded">创建身份 & 4位验证码</button>
          </div>
          <div id="host-room-info" class="mt-3 hidden">
            <div class="p-2 bg-gray-100 rounded text-center">
              <p class="text-sm">本局验证码：<span id="room-code" class="font-bold text-lg"></span></p>
            </div>
          </div>
        </div>

        <div class="bg-white rounded-xl p-4 shadow mb-4">
          <h3 class="font-bold mb-2">👤 玩家 - 查看身份</h3>
          <div class="space-y-2">
            <input type="text" id="user-code" placeholder="输入4位验证码" maxlength="4" class="w-full border p-2 rounded">
            <input type="number" id="user-seat" placeholder="输入你的编号（1-20）" min="1" max="20" class="w-full border p-2 rounded">
            <button onclick="userGetRole()" class="w-full bg-success text-white p-2 rounded">查看身份</button>
          </div>
          <div id="role-card" class="mt-3 p-3 rounded text-center hidden">
            <p class="text-xs">你的身份：</p>
            <div id="role-text" class="text-xl font-bold blur-role py-1"></div>
            <button onclick="showRole()" class="mt-1 text-xs bg-gray-200 px-2 py-1 rounded">长按显示身份</button>
          </div>
        </div>

        <div class="flex gap-2">
          <button onclick="goPage('vote')" class="flex-1 bg-vote text-white p-2 rounded">投票大厅</button>
          <button onclick="goPage('host')" class="flex-1 bg-gray-700 text-white p-2 rounded">主持人控制台</button>
        </div>
      </div>

      <!-- 投票页 -->
      <div id="page-vote" class="hidden">
        <h3 class="font-bold text-center mb-3">🗳️ 投票大厅</h3>
        <div class="bg-white rounded-xl p-4 shadow mb-4">
          <h4 class="font-bold text-primary mb-2">主持人 - 开启投票</h4>
          <div id="vote-werewolf" class="space-y-2">
            <button onclick="hostStartSheriffVote()" class="w-full bg-vote text-white p-2 rounded">警长竞选投票</button>
            <input id="vote-targets" placeholder="放逐编号（空格分隔）" class="w-full border p-2 rounded">
            <button onclick="hostStartExileVote()" class="w-full bg-danger text-white p-2 rounded">白天放逐投票</button>
          </div>
          <div id="vote-avalon" class="hidden space-y-2">
            <input id="quest-round" placeholder="轮次" class="w-full border p-2 rounded mb-1">
            <input id="quest-team" placeholder="上车编号" class="w-full border p-2 rounded mb-1">
            <button onclick="hostStartTeamVote()" class="w-full bg-avalon text-white p-2 rounded">组队投票</button>
            <button onclick="hostStartQuestVote()" class="w-full bg-orange-500 text-white p-2 rounded">任务投票</button>
          </div>
          <div class="mt-3 p-2 bg-gray-100 rounded text-center">
            <p class="text-xs">投票码：<span id="vote-code" class="font-bold"></span></p>
          </div>
          <div id="vote-result" class="mt-2 text-sm text-center"></div>
        </div>

        <div class="bg-white rounded-xl p-4 shadow">
          <h4 class="font-bold mb-2">玩家 - 参与投票</h4>
          <input id="user-vote-code" placeholder="输入投票码" class="w-full border p-2 rounded mb-2">
          <div id="vote-buttons" class="grid grid-cols-2 gap-2"></div>
        </div>

        <button onclick="goPage('home')" class="mt-4 w-full bg-gray-600 text-white p-2 rounded">返回首页</button>
      </div>

      <!-- 主持人控制台 -->
      <div id="page-host" class="hidden">
        <h3 class="font-bold text-center mb-3">⚙️ 主持人控制台</h3>
        <div class="bg-white rounded-xl p-4 shadow mb-4 space-y-2">
          <input id="mark-out-seat" placeholder="标记出局玩家编号" class="w-full border p-2 rounded">
          <button onclick="hostMarkOut()" class="w-full bg-danger text-white p-2 rounded">标记出局</button>
          <button onclick="hostResetRoom()" class="w-full bg-gray-700 text-white p-2 rounded">重置整局游戏</button>
          <button onclick="hostTransferBadge()" class="w-full bg-vote text-white p-2 rounded">警徽移交 / 撕毁</button>
        </div>
        <button onclick="goPage('home')" class="w-full bg-gray-600 text-white p-2 rounded">返回</button>
      </div>
    </div>
  </div>

  <script>
    let room = null;
    let voteSession = null;
    let voted = new Set();
    let outSeats = new Set();
    let sheriff = null;
    let roleTemp = "";

    const rolePool = {
      werewolf: ["狼人","狼人","平民","平民","平民","预言家","女巫","猎人"],
      avalon: ["梅林","派西维尔","忠臣","忠臣","莫德雷德","刺客","莫甘娜","爪牙"]
    };

    // 工具
    function toast(msg) {
      const t = document.getElementById("toast");
      t.innerText = msg;
      t.classList.add("show");
      setTimeout(() => t.classList.remove("show"), 1800);
    }

    function goPage(page) {
      document.querySelectorAll("#pages > div").forEach(p => p.classList.add("hidden"));
      document.getElementById("page-" + page).classList.remove("hidden");
      if (page === "vote") {
        const g = room?.type || "werewolf";
        document.getElementById("vote-werewolf").classList.toggle("hidden", g !== "werewolf");
        document.getElementById("vote-avalon").classList.toggle("hidden", g !== "avalon");
      }
    }

    function showRole() {
      const el = document.getElementById("role-text");
      el.classList.remove("blur-role");
      setTimeout(() => el.classList.add("blur-role"), 1200);
    }

    // 创建游戏
    function hostCreateGame() {
      const type = document.getElementById("game-type").value;
      const count = parseInt(document.getElementById("player-count").value);
      if (count < 3 || count > 20) { toast("人数必须3-20"); return; }
      const code = String(Math.floor(1000 + Math.random() * 9000));
      const pool = [...rolePool[type]];
      while (pool.length < count) pool.push(...rolePool[type]);
      const roles = pool.slice(0, count).sort(() => Math.random() - 0.5);
      room = { code, type, total: count, roles };
      voted = new Set();
      outSeats = new Set();
      sheriff = null;
      document.getElementById("room-code").innerText = code;
      document.getElementById("host-room-info").classList.remove("hidden");
      toast("创建成功！验证码：" + code);
    }

    // 玩家查看身份
    function userGetRole() {
      if (!room) { toast("请先创建房间"); return; }
      const code = document.getElementById("user-code").value.trim();
      const seat = parseInt(document.getElementById("user-seat").value);
      if (code !== room.code || isNaN(seat) || seat < 1 || seat > room.total) {
        toast("验证码或编号错误");
        return;
      }
      if (outSeats.has(seat)) { toast("你已出局"); return; }
      roleTemp = room.roles[seat - 1];
      const card = document.getElementById("role-card");
      const txt = document.getElementById("role-text");
      txt.innerText = roleTemp;
      txt.classList.add("blur-role");
      card.classList.remove("hidden");
    }

    // 主持人开启投票
    function hostStartSheriffVote() {
      if (!room || room.type !== "werewolf") { toast("请创建狼人杀"); return; }
      const vcode = String(Math.floor(1000 + Math.random() * 9000));
      voteSession = { type: "sheriff", code: vcode, total: room.total, votes: {} };
      for (let i = 1; i <= room.total; i++) voteSession.votes[i] = 0;
      document.getElementById("vote-code").innerText = vcode;
      document.getElementById("vote-result").innerHTML = "";
      voted = new Set();
      toast("警长投票已开启");
    }

    function hostStartExileVote() {
      if (!room || room.type !== "werewolf") return;
      const targets = document.getElementById("vote-targets").value.trim().split(/\s+/).map(Number).filter(n => !isNaN(n) && n > 0);
      if (targets.length === 0) { toast("请输入放逐编号"); return; }
      const vcode = String(Math.floor(1000 + Math.random() * 9000));
      voteSession = { type: "exile", code: vcode, targets, votes: {} };
      targets.forEach(t => voteSession.votes[t] = 0);
      document.getElementById("vote-code").innerText = vcode;
      document.getElementById("vote-result").innerHTML = "";
      voted = new Set();
      toast("放逐投票已开启");
    }

    function hostStartTeamVote() {
      if (!room || room.type !== "avalon") return;
      const vcode = String(Math.floor(1000 + Math.random() * 9000));
      voteSession = { type: "team", code: vcode, yes: 0, no: 0 };
      document.getElementById("vote-code").innerText = vcode;
      document.getElementById("vote-result").innerHTML = "同意：0 / 反对：0";
      voted = new Set();
      toast("组队投票已开启");
    }

    function hostStartQuestVote() {
      if (!room || room.type !== "avalon") return;
      const vcode = String(Math.floor(1000 + Math.random() * 9000));
      voteSession = { type: "quest", code: vcode, fail: 0 };
      document.getElementById("vote-code").innerText = vcode;
      document.getElementById("vote-result").innerHTML = "失败票：0";
      voted = new Set();
      toast("任务投票已开启");
    }

    // 投票码输入监听
    document.getElementById("user-vote-code").addEventListener("input", function () {
      const vc = this.value.trim();
      if (!voteSession || voteSession.code !== vc) {
        document.getElementById("vote-buttons").innerHTML = "";
        return;
      }
      const box = document.getElementById("vote-buttons");
      box.innerHTML = "";
      if (voteSession.type === "sheriff") {
        for (let i = 1; i <= room.total; i++) {
          const btn = document.createElement("button");
          btn.className = "bg-vote text-white p-2 rounded";
          btn.innerText = i + "号";
          btn.onclick = () => doVote(i);
          box.appendChild(btn);
        }
      }
      if (voteSession.type === "exile") {
        voteSession.targets.forEach(t => {
          const btn = document.createElement("button");
          btn.className = "bg-danger text-white p-2 rounded";
          btn.innerText = t + "号";
          btn.onclick = () => doVote(t);
          box.appendChild(btn);
        });
      }
      if (voteSession.type === "team") {
        const by = document.createElement("button");
        by.className = "bg-success text-white p-2 rounded";
        by.innerText = "同意";
        by.onclick = () => doVote("yes");
        const bn = document.createElement("button");
        bn.className = "bg-danger text-white p-2 rounded";
        bn.innerText = "反对";
        bn.onclick = () => doVote("no");
        box.append(by, bn);
      }
      if (voteSession.type === "quest") {
        const bs = document.createElement("button");
        bs.className = "bg-success text-white p-2 rounded";
        bs.innerText = "成功";
        bs.onclick = () => doVote("success");
        const bf = document.createElement("button");
        bf.className = "bg-danger text-white p-2 rounded";
        bf.innerText = "失败";
        bf.onclick = () => doVote("fail");
        box.append(bs, bf);
      }
    });

    // 投票执行
    function doVote(value) {
      const seat = parseInt(document.getElementById("user-seat").value);
      if (!seat || outSeats.has(seat)) { toast("无法投票"); return; }
      if (voted.has(seat)) { toast("你已投票"); return; }
      voted.add(seat);

      if (voteSession.type === "sheriff") {
        voteSession.votes[value]++;
        let html = "";
        for (let i = 1; i <= room.total; i++) html += `${i}号：${voteSession.votes[i]}票<br>`;
        document.getElementById("vote-result").innerHTML = html;
      }
      if (voteSession.type === "exile") {
        voteSession.votes[value]++;
        let html = "";
        voteSession.targets.forEach(t => html += `${t}号：${voteSession.votes[t]}票<br>`);
        document.getElementById("vote-result").innerHTML = html;
      }
      if (voteSession.type === "team") {
        value === "yes" ? voteSession.yes++ : voteSession.no++;
        document.getElementById("vote-result").innerHTML = `同意：${voteSession.yes} / 反对：${voteSession.no}`;
      }
      if (voteSession.type === "quest") {
        if (value === "fail") voteSession.fail++;
        document.getElementById("vote-result").innerHTML = `失败票：${voteSession.fail}`;
      }
      toast("投票成功");
    }

    // 主持人功能
    function hostMarkOut() {
      const s = parseInt(document.getElementById("mark-out-seat").value);
      if (!s || !room || s < 1 || s > room.total) { toast("编号错误"); return; }
      outSeats.add(s);
      toast(`已标记 ${s} 号出局`);
    }

    function hostResetRoom() {
      room = null; voteSession = null; voted = new Set(); outSeats = new Set(); sheriff = null;
      document.getElementById("host-room-info").classList.add("hidden");
      toast("游戏已重置");
    }

    function hostTransferBadge() {
      const target = prompt("输入警徽接收编号（0=撕毁）");
      if (target === null) return;
      const num = parseInt(target);
      if (num === 0) {
        sheriff = null;
        toast("警徽已撕毁");
      } else if (num >= 1 && num <= room?.total) {
        sheriff = num;
        toast(`${num} 号成为警长`);
      } else {
        toast("编号无效");
      }
    }
  </script>
</body>
</html>
